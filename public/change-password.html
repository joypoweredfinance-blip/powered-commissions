<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Set your password — POWERED Commissions</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%2315131A'/%3E%3Cpath d='M13 2 L6 14 H11 L9 22 L18 9 H12 Z' fill='%236B3FD4'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/shared/brand.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand-logo"><img src="/shared/logo.svg" alt="POWERED"></div>
    <h1>Set a new password</h1>
    <p class="sub">For security, choose your own password before continuing.</p>
    <div class="error-msg" id="errorMsg"></div>
    <form id="pwForm">
      <label for="newPassword">New password (min 8 characters)</label>
      <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" minlength="8" required>
      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" minlength="8" required>
      <button type="submit" class="btn" id="submitBtn">Save & Continue</button>
    </form>
  </div>
</div>
<script>
const form = document.getElementById('pwForm');
const errorMsg = document.getElementById('errorMsg');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.classList.remove('show');
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  if (newPassword !== confirmPassword) {
    errorMsg.textContent = 'Passwords do not match.';
    errorMsg.classList.add('show');
    return;
  }
  submitBtn.disabled = true;
  submitBtn.textContent = 'Saving…';
  try {
    const res = await fetch('/api/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ newPassword })
    });
    const data = await res.json();
    if (!res.ok) {
      errorMsg.textContent = data.error || 'Something went wrong.';
      errorMsg.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Save & Continue';
      return;
    }
    window.location.href = data.redirect;
  } catch (err) {
    errorMsg.textContent = 'Could not reach the server. Try again.';
    errorMsg.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Save & Continue';
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>POWERED Commissions — Login</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%2315131A'/%3E%3Cpath d='M13 2 L6 14 H11 L9 22 L18 9 H12 Z' fill='%236B3FD4'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/shared/brand.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand-logo">POWERED <span class="bolt">⚡</span></div>
    <h1>Sign in to Commissions</h1>
    <p class="sub">Use the email and password you were given.</p>
    <div class="error-msg" id="errorMsg"></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="username" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>
  </div>
</div>
<script>
const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.classList.remove('show');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in…';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) {
      errorMsg.textContent = data.error || 'Something went wrong.';
      errorMsg.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
      return;
    }
    window.location.href = data.redirect;
  } catch (err) {
    errorMsg.textContent = 'Could not reach the server. Try again.';
    errorMsg.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>

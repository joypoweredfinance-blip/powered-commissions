<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Rep View — POWERED Commissions</title>
<link rel="stylesheet" href="/shared/brand.css">
<link rel="stylesheet" href="/admin/admin.css">
<link rel="stylesheet" href="/rep/rep.css">
</head>
<body>
<script src="/admin/admin-common.js"></script>
<script>renderAdminShell('/admin/reps.html', 'Rep View (Read-Only)');</script>
<script>
const repId = new URLSearchParams(window.location.search).get('repId');
const dealId = new URLSearchParams(window.location.search).get('dealId');
function fmtRate(n) { return (n === null || n === undefined || n === '') ? '—' : '$' + Number(n).toFixed(3); }
function fmtPct(n) { return (n === null || n === undefined || n === '') ? '—' : Number(n).toFixed(2) + '%'; }

// Classification totals only — matches exactly what the rep themselves would see, never an
// individual item's label/description.
// Classification totals only — "Other" and "Permit" fold into Miscellaneous server-side,
// never shown to reps.
function renderAdderTotals(totals) {
  const total = (totals.mpu || 0) + (totals.battery || 0) + (totals.reroof_sow || 0) + (totals.misc || 0);
  return `
    <div class="detail-row"><span class="lbl">MPU</span><span class="val">${fmtMoney(totals.mpu)}</span></div>
    <div class="detail-row"><span class="lbl">Battery</span><span class="val">${fmtMoney(totals.battery)}</span></div>
    <div class="detail-row"><span class="lbl">Roofing</span><span class="val">${fmtMoney(totals.reroof_sow)}</span></div>
    <div class="detail-row"><span class="lbl">Miscellaneous</span><span class="val">${fmtMoney(totals.misc)}</span></div>
    <div class="detail-row" style="font-weight:700; border-top:2px solid var(--brand-ink); margin-top:4px;"><span class="lbl">Total Adders</span><span class="val">${fmtMoney(total)}</span></div>
  `;
}

async function load() {
  let j;
  try {
    j = await api('GET', `/api/dashboard/rep/${repId}/job/${dealId}`);
  } catch (e) {
    document.getElementById('pageContent').innerHTML = `<p style="text-align:center; color:var(--brand-muted); margin-top:40px;">${e.message}</p><a href="/admin/rep-dashboard.html?id=${repId}" style="display:block; text-align:center; margin-top:10px;">← Back to Rep's Dashboard</a>`;
    return;
  }
  document.querySelector('.topbar h1').textContent = `${j.rep.full_name}'s View (Read-Only)`;
  const isCloser = j.viewRole === 'closer';
  document.getElementById('pageContent').innerHTML = `
    <div style="max-width:600px;">
      <div style="display:flex; justify-content:flex-end; margin-bottom:10px;" class="no-print">
        <button class="btn secondary small" onclick="window.print()">⬇ Export PDF</button>
      </div>
      <div class="badge muted no-print" style="margin-bottom:10px;">This is exactly what ${j.rep.display_name || j.rep.full_name} sees — nothing here is editable.</div>
      <div class="breakdown-header role-${j.viewRole}">
        <div class="role-label">${isCloser ? 'Final Breakdown · Closer' : 'Setter Pay Breakdown'}</div>
        <div class="customer">${j.customer_name}</div>
      </div>

      <div class="detail-section">
        <p class="section-title" style="margin-top:0;">Project Details</p>
        <div class="detail-row"><span class="lbl">Address</span><span class="val">${j.customer_address || '—'}</span></div>
        <div class="detail-row"><span class="lbl">Closer</span><span class="val">${j.closer_display || '—'}</span></div>
        <div class="detail-row"><span class="lbl">Setter</span><span class="val">${j.setter_display || '—'}</span></div>
        <div class="detail-row"><span class="lbl">Status</span><span class="val">${j.status_label || '—'}</span></div>
        <div class="detail-row"><span class="lbl">Date Signed</span><span class="val">${fmtDate(j.date_signed)}</span></div>
        <div class="detail-row"><span class="lbl">Roof Date</span><span class="val">${fmtDate(j.roof_date)}</span></div>
        <div class="detail-row"><span class="lbl">Solar Date</span><span class="val">${fmtDate(j.install_completed_date)}</span></div>
      </div>

      <div class="detail-section">
        <p class="section-title" style="margin-top:0;">System &amp; Finance</p>
        <div class="detail-row"><span class="lbl">System Size</span><span class="val">${j.system_size_kw ? j.system_size_kw + ' kW' : '—'}</span></div>
        <div class="detail-row"><span class="lbl">Annual Production</span><span class="val">${j.annual_production_kwh ? j.annual_production_kwh.toLocaleString() + ' kWh' : '—'}</span></div>
        <div class="detail-row"><span class="lbl">Total Contract</span><span class="val">${fmtMoney(j.contract_value)}</span></div>
        <div class="detail-row"><span class="lbl">Monthly Payment</span><span class="val">${fmtMoney(j.monthly_payment)}</span></div>
        <div class="detail-row"><span class="lbl">Rate per kWh</span><span class="val">${fmtRate(j.rate_per_kwh)}</span></div>
        <div class="detail-row"><span class="lbl">Escalator</span><span class="val">${fmtPct(j.escalator_pct)}</span></div>
        <div class="detail-row"><span class="lbl">Module Type</span><span class="val">${j.module_type || '—'}</span></div>
        <div class="detail-row"><span class="lbl">Battery Type</span><span class="val">${j.battery_type || '—'}</span></div>
        ${j.cashback_amount ? `<div class="detail-row"><span class="lbl">Cashback</span><span class="val">${fmtMoney(j.cashback_amount)}</span></div>` : ''}
      </div>

      <div class="detail-section">
        <p class="section-title" style="margin-top:0;">Project Adders</p>
        ${renderAdderTotals(j.adderCategoryTotals || {})}
      </div>

      <div class="detail-section">
        ${j.below_floor ? `<div class="error-msg show">This deal is below the pay-scale floor — pay is pending manual review.</div>` : ''}
        <p class="section-title" style="margin-top:0;">Rep Pay Summary</p>
        <div class="detail-row"><span class="lbl">Net PPW</span><span class="val">${j.net_ppw ?? '—'}</span></div>
        <div class="detail-row"><span class="lbl">Pay Scale</span><span class="val">${j.pay_scale_rate ? fmtMoney(j.pay_scale_rate) + '/kW' : '—'}</span></div>
        ${isCloser ? `<div class="detail-row"><span class="lbl">Gross Pay</span><span class="val">${fmtMoney(j.payGross)}</span></div>` : ''}
        ${j.cashbackDeduction ? `<div class="detail-row"><span class="lbl">Cashback Deduction</span><span class="val">−${fmtMoney(j.cashbackDeduction)}</span></div>` : ''}
        ${j.advanceDeduction ? `<div class="detail-row"><span class="lbl">Advance Deduction</span><span class="val">−${fmtMoney(j.advanceDeduction)}</span></div>` : ''}
        ${j.otherDeduction ? `<div class="detail-row"><span class="lbl">Other Deduction</span><span class="val">−${fmtMoney(j.otherDeduction)}</span></div>` : ''}
        <div class="detail-row" style="border-top:2px solid var(--brand-ink); padding-top:10px; margin-top:4px;">
          <span class="lbl" style="font-weight:700; color:var(--brand-ink);">${isCloser ? 'Your Pay (net)' : 'Your Pay'}</span>
          <span class="val" style="font-size:18px;">${fmtMoney(j.payAmount)}</span>
        </div>
        <div class="detail-row"><span class="lbl">Status</span><span class="val">${j.paid ? `✅ Paid ${fmtDate(j.paidDate)}` : '⏳ Not yet paid'}</span></div>
      </div>

      <a href="/admin/rep-dashboard.html?id=${repId}" style="display:inline-block; margin-top:6px;">← Back to ${j.rep.display_name || j.rep.full_name}'s Dashboard</a>
    </div>
  `;
}
load();
</script>
</body>
</html>

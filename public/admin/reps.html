<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sales Reps — POWERED Commissions</title>
<link rel="stylesheet" href="/shared/brand.css">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<script src="/admin/admin-common.js"></script>
<script>renderAdminShell('/admin/reps.html', 'Sales Reps');</script>
<script>
let SCALES = [];
let REPS = [];

document.getElementById('pageContent').innerHTML = `
  <div class="toolbar">
    <button class="btn small" id="addRepBtn" style="width:auto; margin-left:auto;">+ Add Rep</button>
  </div>
  <div class="card" id="addRepCard" style="display:none; margin-bottom:16px; max-width:480px;">
    <p class="section-title">New Rep</p>
    <div class="field-row">
      <div><label>First Name</label><input type="text" id="nr_first_name"></div>
      <div><label>Last Name</label><input type="text" id="nr_last_name"></div>
    </div>
    <label>Display Name (short, e.g. "Roy F")</label><input type="text" id="nr_display_name">
    <label>Pay Scale</label><select id="nr_pay_scale_id"></select>
    <label>Email (optional, can add later)</label><input type="email" id="nr_email">
    <div style="display:flex; gap:8px;">
      <button class="btn small" id="saveRepBtn" style="width:auto;">Save Rep</button>
      <button class="btn secondary small" id="cancelRepBtn" style="width:auto;">Cancel</button>
    </div>
  </div>
  <div class="card" style="overflow-x:auto;">
    <table class="data-table">
      <thead><tr><th>Name</th><th>Pay Scale</th><th>Login</th><th>Status</th><th></th></tr></thead>
      <tbody id="repsBody"></tbody>
    </table>
  </div>
`;

async function loadScales() {
  const settings = await api('GET', '/api/settings');
  SCALES = settings.payScales;
  document.getElementById('nr_pay_scale_id').innerHTML = SCALES.map((s) => `<option value="${s.id}">${s.name}</option>`).join('');
}

function scaleSelect(repId, currentScaleId) {
  return `<select class="scale-select" data-id="${repId}">
    ${SCALES.map((s) => `<option value="${s.id}" ${s.id === currentScaleId ? 'selected' : ''}>${s.name}</option>`).join('')}
  </select>`;
}

function editPanelHtml(r) {
  return `
    <tr class="edit-row" data-edit-for="${r.id}" style="display:none;">
      <td colspan="6">
        <div class="card" style="background:var(--brand-bg); margin:8px 0;">
          <p class="section-title">Edit Profile <span style="font-weight:400; text-transform:none; font-size:12px;">— admin/super admin only, never visible to the rep</span></p>
          <div class="field-row">
            <div><label>First Name</label><input type="text" class="ed-first" value="${r.first_name || ''}"></div>
            <div><label>Last Name</label><input type="text" class="ed-last" value="${r.last_name || ''}"></div>
          </div>
          <div class="field-row">
            <div><label>Display Name</label><input type="text" class="ed-display" value="${r.display_name || ''}"></div>
            <div><label>Phone</label><input type="text" class="ed-phone" value="${r.phone || ''}"></div>
          </div>
          <label>Email</label><input type="email" class="ed-email" value="${r.email || ''}">
          <div class="field-row">
            <div>
              <label>Pay Type</label>
              <select class="ed-pay-type">
                <option value="commission" ${r.pay_type === 'commission' || !r.pay_type ? 'selected' : ''}>Commission (per deal)</option>
                <option value="weekly" ${r.pay_type === 'weekly' ? 'selected' : ''}>Weekly (flat amount)</option>
                <option value="both" ${r.pay_type === 'both' ? 'selected' : ''}>Both (weekly + commission)</option>
              </select>
            </div>
            <div class="ed-weekly-wrap" style="${r.pay_type === 'weekly' || r.pay_type === 'both' ? '' : 'display:none;'}">
              <label>Weekly Amount ($)</label><input type="number" step="0.01" class="ed-weekly-amount" value="${r.weekly_amount ?? ''}">
            </div>
          </div>
          <label>Account / Payment Info</label>
          <textarea class="ed-account-info" rows="2" placeholder="e.g. Zelle, bank details, Venmo handle">${r.account_info || ''}</textarea>
          <label>Notes</label>
          <textarea class="ed-notes" rows="2" placeholder="Internal notes — never shown to the rep">${r.notes || ''}</textarea>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button class="btn small ed-save" data-id="${r.id}" style="width:auto;">Save Profile</button>
            <button class="btn secondary small ed-cancel" data-id="${r.id}" style="width:auto;">Cancel</button>
          </div>
        </div>
      </td>
    </tr>
  `;
}

async function loadReps() {
  REPS = await api('GET', '/api/reps');
  document.getElementById('repsBody').innerHTML = REPS.map((r) => `
    <tr data-id="${r.id}">
      <td><a href="/admin/rep-dashboard.html?id=${r.id}"><strong>${r.full_name}</strong></a>${r.display_name ? `<br><span style="color:var(--brand-muted); font-size:12px;">${r.display_name}</span>` : ''}${r.pay_type === 'weekly' ? '<br><span class="badge amber">Weekly Pay</span>' : r.pay_type === 'both' ? '<br><span class="badge amber">Weekly + Commission</span>' : ''}</td>
      <td>${scaleSelect(r.id, r.pay_scale_id)}</td>
      <td>${r.login_email ? `<span class="badge green">${r.login_email}</span> <button class="btn secondary small reset-pw-btn" data-id="${r.id}" style="width:auto;">Reset Password</button>` : `<button class="btn secondary small create-login-btn" data-id="${r.id}" style="width:auto;">Create Login</button>`}</td>
      <td>${r.active ? '<span class="badge green">Active</span>' : '<span class="badge muted">Inactive</span>'}</td>
      <td>
        <button class="btn secondary small edit-profile-btn" data-id="${r.id}" style="width:auto;">Edit Profile</button>
        <button class="btn secondary small toggle-active-btn" data-id="${r.id}" data-active="${r.active}" style="width:auto;">${r.active ? 'Deactivate' : 'Reactivate'}</button>
        <button class="btn danger small delete-rep-btn" data-id="${r.id}" data-name="${r.full_name}" style="width:auto;">Delete</button>
      </td>
    </tr>
    ${editPanelHtml(r)}
  `).join('');

  document.querySelectorAll('.scale-select').forEach((sel) => {
    sel.addEventListener('change', async () => {
      try { await api('PUT', `/api/reps/${sel.dataset.id}`, { pay_scale_id: Number(sel.value) }); } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll('.create-login-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const email = prompt('Email for this rep\'s login:');
      if (!email) return;
      try {
        const result = await api('POST', `/api/reps/${btn.dataset.id}/create-login`, { email });
        alert(`Login created.\n\nEmail: ${result.email}\nTemporary password: ${result.tempPassword}\n\nShare these with the rep — they'll be asked to set their own password on first login.`);
        loadReps();
      } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll('.reset-pw-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      if (!confirm('Reset this rep\'s password? They\'ll need the new temporary password to log in.')) return;
      try {
        const result = await api('POST', `/api/reps/${btn.dataset.id}/reset-password`);
        alert(`New temporary password for ${result.email}:\n\n${result.tempPassword}\n\nShare this with them — they'll set their own password on next login.`);
      } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll('.toggle-active-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      try {
        await api('PUT', `/api/reps/${btn.dataset.id}`, { active: btn.dataset.active === '1' ? 0 : 1 });
        loadReps();
      } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll('.delete-rep-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      if (!confirm(`Permanently delete ${btn.dataset.name}? This cannot be undone.`)) return;
      try {
        await api('DELETE', `/api/reps/${btn.dataset.id}`);
        loadReps();
      } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll('.edit-profile-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      const row = document.querySelector(`tr.edit-row[data-edit-for="${btn.dataset.id}"]`);
      row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
    });
  });
  document.querySelectorAll('.ed-cancel').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelector(`tr.edit-row[data-edit-for="${btn.dataset.id}"]`).style.display = 'none';
    });
  });
  document.querySelectorAll('.ed-pay-type').forEach((sel) => {
    sel.addEventListener('change', () => {
      const wrap = sel.closest('.card').querySelector('.ed-weekly-wrap');
      wrap.style.display = sel.value === 'weekly' || sel.value === 'both' ? '' : 'none';
    });
  });
  document.querySelectorAll('.ed-save').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const panel = document.querySelector(`tr.edit-row[data-edit-for="${btn.dataset.id}"]`);
      try {
        await api('PUT', `/api/reps/${btn.dataset.id}`, {
          first_name: panel.querySelector('.ed-first').value.trim() || null,
          last_name: panel.querySelector('.ed-last').value.trim() || null,
          display_name: panel.querySelector('.ed-display').value.trim() || null,
          phone: panel.querySelector('.ed-phone').value.trim() || null,
          email: panel.querySelector('.ed-email').value.trim() || null,
          pay_type: panel.querySelector('.ed-pay-type').value,
          weekly_amount: parseFloat(panel.querySelector('.ed-weekly-amount').value) || null,
          account_info: panel.querySelector('.ed-account-info').value.trim() || null,
          notes: panel.querySelector('.ed-notes').value.trim() || null
        });
        loadReps();
      } catch (e) { alert(e.message); }
    });
  });
}

document.getElementById('addRepBtn').addEventListener('click', () => {
  document.getElementById('addRepCard').style.display = 'block';
});
document.getElementById('cancelRepBtn').addEventListener('click', () => {
  document.getElementById('addRepCard').style.display = 'none';
});
document.getElementById('saveRepBtn').addEventListener('click', async () => {
  const first_name = document.getElementById('nr_first_name').value.trim();
  const last_name = document.getElementById('nr_last_name').value.trim();
  if (!first_name && !last_name) { alert('First or last name is required.'); return; }
  try {
    await api('POST', '/api/reps', {
      first_name: first_name || null,
      last_name: last_name || null,
      display_name: document.getElementById('nr_display_name').value.trim() || null,
      pay_scale_id: Number(document.getElementById('nr_pay_scale_id').value),
      email: document.getElementById('nr_email').value.trim() || null
    });
    document.getElementById('addRepCard').style.display = 'none';
    ['nr_first_name', 'nr_last_name', 'nr_display_name', 'nr_email'].forEach((id) => { document.getElementById(id).value = ''; });
    loadReps();
  } catch (e) { alert(e.message); }
});

loadScales().then(loadReps);
</script>
</body>
</html>

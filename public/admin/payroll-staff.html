<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Payroll Staff — POWERED Commissions</title>
<link rel="stylesheet" href="/shared/brand.css">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<script src="/admin/admin-common.js"></script>
<script>renderAdminShell('/admin/payroll-staff.html', 'Payroll Staff');</script>
<script>
document.getElementById('pageContent').innerHTML = `
  <p style="color:var(--brand-muted); margin-bottom:16px; max-width:680px;">
    Etai, Noy, Joey, and Austin aren't sales reps — their pay isn't tied to closing/setting a deal the same way.
    Give each one their own login here so they can see only their own payroll ledger, sourced from approved Commission Summary pay runs.
  </p>
  <div class="toolbar">
    <button class="btn small" id="addStaffBtn" style="width:auto; margin-left:auto;">+ Add Staff Member</button>
  </div>
  <div class="card" id="addStaffCard" style="display:none; margin-bottom:16px; max-width:480px;">
    <p class="section-title">New Payroll Staff Member</p>
    <div class="field-row">
      <div><label>First Name</label><input type="text" id="ns_first_name"></div>
      <div><label>Last Name</label><input type="text" id="ns_last_name"></div>
    </div>
    <label>Type</label>
    <select id="ns_staff_type">
      <option value="owner">Owner (per-deal M1+M2 distribution)</option>
      <option value="pm">Project Manager (weekly salary + M2 bonus)</option>
      <option value="ops">Operations (monthly base + kW top-up)</option>
    </select>
    <label>Email (optional, can add later)</label><input type="email" id="ns_email">
    <div style="display:flex; gap:8px;">
      <button class="btn small" id="saveStaffBtn" style="width:auto;">Save</button>
      <button class="btn secondary small" id="cancelStaffBtn" style="width:auto;">Cancel</button>
    </div>
  </div>
  <div class="card" style="overflow-x:auto;">
    <table class="data-table">
      <thead><tr><th>Name</th><th>Type</th><th>Formula</th><th>Login</th><th>Status</th><th></th></tr></thead>
      <tbody id="staffBody"></tbody>
    </table>
  </div>
`;

const FORMULA_LABEL = {
  owner: '$500 at M1 + $500 at M2 per funded deal',
  pm: 'Weekly salary + M2 bonus by Net PPW tier',
  ops: 'MAX($6,000, monthly installed kW × $55)'
};

function editPanelHtml(s) {
  return `
    <tr class="edit-row" data-edit-for="${s.id}" style="display:none;">
      <td colspan="6">
        <div class="card" style="background:var(--brand-bg); margin:8px 0;">
          <p class="section-title">Edit Profile <span style="font-weight:400; text-transform:none; font-size:12px;">— admin/super admin only, never visible to the staff member</span></p>
          <div class="field-row">
            <div><label>First Name</label><input type="text" class="ed-first" value="${s.first_name || ''}"></div>
            <div><label>Last Name</label><input type="text" class="ed-last" value="${s.last_name || ''}"></div>
          </div>
          <div class="field-row">
            <div><label>Phone</label><input type="text" class="ed-phone" value="${s.phone || ''}"></div>
            <div><label>Email</label><input type="email" class="ed-email" value="${s.email || ''}"></div>
          </div>
          <label>Account / Payment Info</label>
          <textarea class="ed-account-info" rows="2" placeholder="e.g. Zelle, bank details, Venmo handle">${s.account_info || ''}</textarea>
          <label>Notes</label>
          <textarea class="ed-notes" rows="2" placeholder="Internal notes — never shown to the staff member">${s.notes || ''}</textarea>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button class="btn small ed-save" data-id="${s.id}" style="width:auto;">Save Profile</button>
            <button class="btn secondary small ed-cancel" data-id="${s.id}" style="width:auto;">Cancel</button>
          </div>
        </div>
      </td>
    </tr>
  `;
}

async function loadStaff() {
  const staff = await api('GET', '/api/payroll-staff');
  document.getElementById('staffBody').innerHTML = staff.map((s) => `
    <tr>
      <td><a href="/admin/staff-dashboard.html?id=${s.id}"><strong>${s.full_name}</strong></a></td>
      <td>${s.staff_type}</td>
      <td style="color:var(--brand-muted); font-size:13px;">${FORMULA_LABEL[s.staff_type] || ''}</td>
      <td>${s.login_email ? `<span class="badge green">${s.login_email}</span> <button class="btn secondary small reset-pw-btn" data-id="${s.id}" style="width:auto;">Reset Password</button>` : `<button class="btn secondary small create-login-btn" data-id="${s.id}" style="width:auto;">Create Login</button>`}</td>
      <td>${s.active ? '<span class="badge green">Active</span>' : '<span class="badge muted">Inactive</span>'}</td>
      <td>
        <button class="btn secondary small edit-profile-btn" data-id="${s.id}" style="width:auto;">Edit Profile</button>
        <button class="btn secondary small toggle-active-btn" data-id="${s.id}" data-active="${s.active}" style="width:auto;">${s.active ? 'Deactivate' : 'Reactivate'}</button>
      </td>
    </tr>
    ${editPanelHtml(s)}
  `).join('');

  document.querySelectorAll('.create-login-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const email = prompt('Email for this person\'s login:');
      if (!email) return;
      try {
        const result = await api('POST', `/api/payroll-staff/${btn.dataset.id}/create-login`, { email });
        alert(`Login created.\n\nEmail: ${result.email}\nTemporary password: ${result.tempPassword}\n\nShare these — they'll set their own password on first login.`);
        loadStaff();
      } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll('.reset-pw-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      if (!confirm('Reset this person\'s password? They\'ll need the new temporary password to log in.')) return;
      try {
        const result = await api('POST', `/api/payroll-staff/${btn.dataset.id}/reset-password`);
        alert(`New temporary password for ${result.email}:\n\n${result.tempPassword}\n\nShare this with them — they'll set their own password on next login.`);
      } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll('.toggle-active-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      try {
        await api('PUT', `/api/payroll-staff/${btn.dataset.id}`, { active: btn.dataset.active === '1' ? 0 : 1 });
        loadStaff();
      } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll('.edit-profile-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      const row = document.querySelector(`tr.edit-row[data-edit-for="${btn.dataset.id}"]`);
      row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
    });
  });
  document.querySelectorAll('.ed-cancel').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelector(`tr.edit-row[data-edit-for="${btn.dataset.id}"]`).style.display = 'none';
    });
  });
  document.querySelectorAll('.ed-save').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const panel = document.querySelector(`tr.edit-row[data-edit-for="${btn.dataset.id}"]`);
      try {
        await api('PUT', `/api/payroll-staff/${btn.dataset.id}`, {
          first_name: panel.querySelector('.ed-first').value.trim() || null,
          last_name: panel.querySelector('.ed-last').value.trim() || null,
          phone: panel.querySelector('.ed-phone').value.trim() || null,
          email: panel.querySelector('.ed-email').value.trim() || null,
          account_info: panel.querySelector('.ed-account-info').value.trim() || null,
          notes: panel.querySelector('.ed-notes').value.trim() || null
        });
        loadStaff();
      } catch (e) { alert(e.message); }
    });
  });
}

document.getElementById('addStaffBtn').addEventListener('click', () => { document.getElementById('addStaffCard').style.display = 'block'; });
document.getElementById('cancelStaffBtn').addEventListener('click', () => { document.getElementById('addStaffCard').style.display = 'none'; });
document.getElementById('saveStaffBtn').addEventListener('click', async () => {
  const first_name = document.getElementById('ns_first_name').value.trim();
  const last_name = document.getElementById('ns_last_name').value.trim();
  if (!first_name && !last_name) { alert('First or last name is required.'); return; }
  try {
    await api('POST', '/api/payroll-staff', {
      first_name: first_name || null,
      last_name: last_name || null,
      staff_type: document.getElementById('ns_staff_type').value,
      email: document.getElementById('ns_email').value.trim() || null
    });
    document.getElementById('addStaffCard').style.display = 'none';
    ['ns_first_name', 'ns_last_name', 'ns_email'].forEach((id) => { document.getElementById(id).value = ''; });
    loadStaff();
  } catch (e) { alert(e.message); }
});

loadStaff();
</script>
</body>
</html>

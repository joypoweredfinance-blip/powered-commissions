<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Dashboard — POWERED Commissions</title>
<link rel="stylesheet" href="/shared/brand.css">
<link rel="stylesheet" href="/admin/admin.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<script src="/admin/admin-common.js"></script>
<script>renderAdminShell('/admin/dashboard.html', 'Dashboard');</script>
<script src="/shared/charts.js"></script>
<script>
let ALL_STATUSES = [];
let SELECTED_STATUS_IDS = [];
let SELECTED_FUNDING_STATUSES = [];
let DATE_RANGE = null; // { startDate, endDate } or null for All Time
let chartInstance = null;
let pieInstance = null;
let installerAddersInstance = null;
const ADDER_CATEGORY_LABELS = { mpu: 'MPU', battery: 'Battery', reroof_sow: 'Roof Costs', permit: 'Permit', misc: 'Miscellaneous', other: 'Other' };

// Fixed, closed list — separate from the flexible CRM status list pulled from /api/meta.
const FUNDING_STATUSES = [
  'M1 Pending', 'M1 Approved - Awaiting Funding', 'M1 Rejected',
  'M2 Pending', 'M2 Approved - Awaiting Funding', 'M2 Rejected Clawback',
  'M1 Funded', 'M1+M2 Funded'
];

document.getElementById('pageContent').innerHTML = `
  <div class="filter-grid" style="margin-bottom:18px;">
    <div class="card filter-card">
      <div style="font-size:12px; font-weight:700; color:var(--brand-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px;">Filter by Date</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <select id="dateTypeFilter" style="margin:0; max-width:160px;">
          <option value="all">All Time</option>
          <option value="year">Year</option>
          <option value="month">Month</option>
          <option value="week">Week</option>
          <option value="range">Custom Range</option>
        </select>
        <div id="dateSecondaryControls" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
        <button class="btn small" id="dateApplyBtn" style="width:auto;">Apply</button>
      </div>
    </div>
    <div class="card filter-card status-filter-wrap">
      <div style="font-size:12px; font-weight:700; color:var(--brand-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px;">Filter by CRM Status</div>
      <button class="btn secondary small" id="statusFilterBtn" style="width:auto;">Filter by CRM Status ▾</button>
      <span id="filterSummary" style="font-size:12px; color:var(--brand-muted); margin-left:10px;"></span>
      <div class="status-filter-panel" id="statusFilterPanel" style="display:none;"></div>
    </div>
    <div class="card filter-card funding-status-filter-wrap" style="position:relative;">
      <div style="font-size:12px; font-weight:700; color:var(--brand-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px;">Filter by Funding Status</div>
      <button class="btn secondary small" id="fundingStatusFilterBtn" style="width:auto;">Filter by Funding Status ▾</button>
      <span id="fundingFilterSummary" style="font-size:12px; color:var(--brand-muted); margin-left:10px;"></span>
      <div class="status-filter-panel" id="fundingStatusFilterPanel" style="display:none;"></div>
    </div>
  </div>

  <div class="kpi-grid" id="fundingGrid" style="margin-bottom:14px;"></div>
  <div class="kpi-grid" id="avgGrid" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));"></div>

  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="detail-grid">
    <div>
      <div class="card" style="margin-bottom:20px;">
        <p class="section-title" id="trendTitle">Funds Received vs Commission Paid, by Job</p>
        <p id="trendNote" style="font-size:12px; color:var(--brand-muted); margin:-6px 0 10px;"></p>
        <div id="trendChartWrap"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="card" style="margin-bottom:20px;">
        <p class="section-title">Contract Value — Where It Goes</p>
        <div style="height:300px;"><canvas id="pieChart"></canvas></div>
      </div>
      <div class="card" style="margin-bottom:20px;">
        <p class="section-title">Adders Cost by Installer <span style="font-weight:400; text-transform:none; font-size:12px;">(average per job)</span></p>
        <div style="height:300px;"><canvas id="installerAddersChart"></canvas></div>
      </div>
      <div class="card">
        <p class="section-title">Pipeline by Status</p>
        <div style="height:420px;"><canvas id="funnelChart"></canvas></div>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:20px;">
        <p class="section-title">Rep Leaderboard</p>
        <div id="leaderboard"></div>
      </div>
      <div class="card" style="margin-bottom:20px;">
        <p class="section-title">Funds Received by Financier</p>
        <div id="financierBreakdown"></div>
      </div>
      <div class="card" id="activityCard" style="display:none;">
        <p class="section-title">Recent Activity</p>
        <div id="activity" style="max-height:360px; overflow-y:auto;"></div>
      </div>
    </div>
  </div>

  <p class="section-title" style="margin-top:24px;">Outstanding Items</p>
  <div class="kpi-grid" id="outstandingGrid"></div>
`;

function kpiCard(label, value, sub, cls = '') {
  return `<div class="kpi-card ${cls}"><div class="label">${label}</div><div class="value">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
}

function pad(n) { return String(n).padStart(2, '0'); }
function isoDate(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }

// Picking a date type/value only stages it — nothing takes effect on the rest of the
// dashboard until "Apply" is clicked, so the numbers and charts don't jump around mid-pick.
function renderDateSecondaryControls(type) {
  const el = document.getElementById('dateSecondaryControls');
  const now = new Date();
  if (type === 'all') {
    el.innerHTML = '';
  } else if (type === 'year') {
    let opts = '';
    for (let y = now.getFullYear(); y >= now.getFullYear() - 5; y--) opts += `<option value="${y}">${y}</option>`;
    el.innerHTML = `<select id="yearPicker" style="margin:0;">${opts}</select>`;
  } else if (type === 'month') {
    let opts = '';
    for (let i = 0; i < 24; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      opts += `<option value="${d.getFullYear()}-${pad(d.getMonth() + 1)}">${d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</option>`;
    }
    el.innerHTML = `<select id="monthPicker" style="margin:0;">${opts}</select>`;
  } else if (type === 'week') {
    el.innerHTML = `<input type="date" id="weekPicker" value="${isoDate(now)}" style="margin:0;"><span style="font-size:12px; color:var(--brand-muted); align-self:center;">pick any day in the week</span>`;
  } else if (type === 'range') {
    const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
    el.innerHTML = `
      <input type="date" id="rangeStart" value="${isoDate(weekAgo)}" style="margin:0;">
      <span style="align-self:center; color:var(--brand-muted);">to</span>
      <input type="date" id="rangeEnd" value="${isoDate(now)}" style="margin:0;">
    `;
  }
}

function applyDateFilter() {
  const type = document.getElementById('dateTypeFilter').value;
  if (type === 'all') {
    DATE_RANGE = null;
  } else if (type === 'year') {
    const y = document.getElementById('yearPicker').value;
    DATE_RANGE = { startDate: `${y}-01-01`, endDate: `${y}-12-31` };
  } else if (type === 'month') {
    const ym = document.getElementById('monthPicker').value;
    const [y, m] = ym.split('-').map(Number);
    const lastDay = new Date(y, m, 0).getDate();
    DATE_RANGE = { startDate: `${ym}-01`, endDate: `${ym}-${pad(lastDay)}` };
  } else if (type === 'week') {
    const anchor = new Date(document.getElementById('weekPicker').value + 'T00:00:00');
    const dow = anchor.getDay(); // 0=Sun
    const monday = new Date(anchor); monday.setDate(anchor.getDate() - ((dow + 6) % 7));
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    DATE_RANGE = { startDate: isoDate(monday), endDate: isoDate(sunday) };
  } else if (type === 'range') {
    DATE_RANGE = { startDate: document.getElementById('rangeStart').value, endDate: document.getElementById('rangeEnd').value };
  }
  load();
}

function statusPanelHtml(options, cbClass) {
  return `
    ${options}
    <div class="actions">
      <button class="btn secondary small panel-select-all" data-cb="${cbClass}" style="width:auto;">All</button>
      <button class="btn secondary small panel-clear-all" data-cb="${cbClass}" style="width:auto;">Clear</button>
      <button class="btn small panel-apply" data-cb="${cbClass}" style="width:auto; margin-left:auto;">Apply</button>
    </div>
  `;
}

async function loadStatuses() {
  const meta = await api('GET', '/api/meta');
  ALL_STATUSES = meta.statuses;
  document.getElementById('statusFilterPanel').innerHTML = statusPanelHtml(
    ALL_STATUSES.map((s) => `<label><input type="checkbox" class="status-cb" value="${s.id}"> ${s.label}</label>`).join(''),
    'status-cb'
  );
  document.getElementById('fundingStatusFilterPanel').innerHTML = statusPanelHtml(
    FUNDING_STATUSES.map((s) => `<label><input type="checkbox" class="funding-status-cb" value="${s}"> ${s}</label>`).join(''),
    'funding-status-cb'
  );

  document.getElementById('dateTypeFilter').addEventListener('change', (e) => {
    renderDateSecondaryControls(e.target.value);
  });
  document.getElementById('dateApplyBtn').addEventListener('click', applyDateFilter);

  document.getElementById('statusFilterBtn').addEventListener('click', () => {
    const panel = document.getElementById('statusFilterPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('fundingStatusFilterBtn').addEventListener('click', () => {
    const panel = document.getElementById('fundingStatusFilterPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  });

  document.querySelectorAll('.panel-select-all').forEach((btn) => btn.addEventListener('click', () => {
    document.querySelectorAll(`.${btn.dataset.cb}`).forEach((cb) => { cb.checked = true; });
  }));
  document.querySelectorAll('.panel-clear-all').forEach((btn) => btn.addEventListener('click', () => {
    document.querySelectorAll(`.${btn.dataset.cb}`).forEach((cb) => { cb.checked = false; });
  }));
  document.querySelectorAll('.panel-apply').forEach((btn) => btn.addEventListener('click', () => {
    if (btn.dataset.cb === 'status-cb') {
      SELECTED_STATUS_IDS = [...document.querySelectorAll('.status-cb:checked')].map((cb) => cb.value);
      document.getElementById('statusFilterPanel').style.display = 'none';
    } else {
      SELECTED_FUNDING_STATUSES = [...document.querySelectorAll('.funding-status-cb:checked')].map((cb) => cb.value);
      document.getElementById('fundingStatusFilterPanel').style.display = 'none';
    }
    load();
  }));
  document.addEventListener('click', (e) => {
    const wrap = document.querySelector('.status-filter-wrap');
    if (wrap && !wrap.contains(e.target)) document.getElementById('statusFilterPanel').style.display = 'none';
    const fwrap = document.querySelector('.funding-status-filter-wrap');
    if (fwrap && !fwrap.contains(e.target)) document.getElementById('fundingStatusFilterPanel').style.display = 'none';
  });
}

async function load() {
  const params = new URLSearchParams();
  SELECTED_STATUS_IDS.forEach((id) => params.append('statusIds', id));
  SELECTED_FUNDING_STATUSES.forEach((s) => params.append('fundingStatuses', s));
  if (DATE_RANGE) {
    params.set('startDate', DATE_RANGE.startDate);
    params.set('endDate', DATE_RANGE.endDate);
  }

  document.getElementById('filterSummary').textContent = SELECTED_STATUS_IDS.length
    ? `${SELECTED_STATUS_IDS.length} status${SELECTED_STATUS_IDS.length > 1 ? 'es' : ''} selected` : '';
  document.getElementById('fundingFilterSummary').textContent = SELECTED_FUNDING_STATUSES.length
    ? `${SELECTED_FUNDING_STATUSES.length} selected` : '';

  const d = await api('GET', `/api/dashboard/overall?${params.toString()}`);
  const k = d.kpis;
  const f = d.fundingStatus;

  document.getElementById('fundingGrid').innerHTML = [
    kpiCard('Incoming (Awaiting Funding)', fmtMoney(f.incoming.total), `${f.incoming.count} deals — right now`, 'funding'),
    kpiCard('Awaiting M1', fmtMoney(f.awaitingM1.total), `${f.awaitingM1.count} deals — right now`, 'funding'),
    kpiCard('Awaiting M2', fmtMoney(f.awaitingM2.total), `${f.awaitingM2.count} deals — right now`, 'funding')
  ].join('');
  document.getElementById('avgGrid').innerHTML = [
    kpiCard('Avg System Size', f.avgSystemSizeKw !== null ? f.avgSystemSizeKw + ' kW' : '—'),
    kpiCard('Avg Net PPW', f.avgNetPpw !== null ? '$' + f.avgNetPpw : '—'),
    kpiCard('Avg Gross', fmtMoney(f.avgGross)),
    kpiCard('Avg POWERED Net', fmtMoney(f.avgPoweredNet))
  ].join('');

  document.getElementById('kpiGrid').innerHTML = [
    kpiCard('Active Deals', k.activeDeals, `${k.totalDeals} total all-time`),
    kpiCard('Funded', k.fundedCount, d.periodLabel),
    kpiCard('Commissions Paid', fmtMoney(k.commissionsPaid), d.periodLabel),
    kpiCard('Funds Received', fmtMoney(k.fundsReceived), d.periodLabel),
    kpiCard('Staff Pay (Etai + Noy + Joey)', fmtMoney(k.staffPay), d.periodLabel),
    kpiCard('Pending Approval', fmtMoney(k.pendingApproval), 'not yet visible to reps')
  ].join('');

  document.getElementById('outstandingGrid').innerHTML = [
    kpiCard('Outstanding Advances', fmtMoney(k.outstandingAdvances)),
    kpiCard('Open Clawbacks', k.openClawbackCount, fmtMoney(k.openClawbackTotal)),
    kpiCard('Pending Referrals', k.pendingReferralCount, fmtMoney(k.pendingReferralTotal))
  ].join('');

  document.getElementById('financierBreakdown').innerHTML = !d.fundsByFinancier || d.fundsByFinancier.length === 0
    ? '<p style="color:var(--brand-muted); font-size:13px;">No funds received logged yet.</p>'
    : `
      <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:2px solid var(--brand-border); font-weight:700;">
        <span>All Financiers</span>
        <strong>${fmtMoney(d.fundsByFinancierTotal)}</strong>
      </div>
      ${d.fundsByFinancier.map((f) => `
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--brand-border);">
          <span>${f.name}</span>
          <strong>${fmtMoney(f.total)}</strong>
        </div>
      `).join('')}
    `;

  if (chartInstance) chartInstance.destroy();
  document.getElementById('trendTitle').textContent = `Funds Received vs Commission Paid, by Job — ${d.periodLabel}`;
  document.getElementById('trendNote').textContent = d.jobComparison.length === 0
    ? 'No jobs with funds received or commission paid in this period.'
    : (d.jobComparisonTruncated ? 'Showing the top 30 jobs by combined value.' : '');
  document.getElementById('trendChartWrap').style.height = Math.max(240, d.jobComparison.length * 28) + 'px';
  chartInstance = d.jobComparison.length === 0 ? null : renderJobComparisonChart('trendChart', d.jobComparison);
  renderFunnelChart('funnelChart', d.pipeline);
  if (pieInstance) pieInstance.destroy();
  pieInstance = d.contractBreakdown.slices.length === 0 ? null : renderContractPieChart('pieChart', d.contractBreakdown);
  if (installerAddersInstance) installerAddersInstance.destroy();
  installerAddersInstance = d.installerAddersComparison.length === 0 ? null : renderInstallerAddersChart('installerAddersChart', d.installerAddersComparison, ADDER_CATEGORY_LABELS);

  document.getElementById('leaderboard').innerHTML = d.leaderboard.length === 0
    ? '<p style="color:var(--brand-muted); font-size:13px;">No paid commissions yet.</p>'
    : d.leaderboard.map((r, i) => `
      <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--brand-border);">
        <span>${i + 1}. ${r.name}</span>
        <strong>${fmtMoney(r.total)}</strong>
      </div>
    `).join('');

  if (d.recentActivity) {
    document.getElementById('activityCard').style.display = 'block';
    document.getElementById('activity').innerHTML = d.recentActivity.length === 0
      ? '<p style="color:var(--brand-muted); font-size:13px;">No activity yet.</p>'
      : d.recentActivity.map((a) => `
        <div class="audit-item">
          ${a.customer_name ? `<strong>${a.customer_name}</strong> — ` : ''}${a.field_name.replace(/_/g, ' ')}: ${a.old_value} → ${a.new_value}
          <div class="meta">${a.changed_by_email || 'system'} · ${new Date(a.changed_at).toLocaleString()}</div>
        </div>
      `).join('');
  }
}

// load() doesn't read anything loadStatuses() sets up, so run both at once instead of
// waiting on one before starting the other.
Promise.all([loadStatuses(), load()]);
</script>
</body>
</html>

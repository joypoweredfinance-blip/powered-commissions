<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Staff Dashboard — POWERED Commissions</title>
<link rel="stylesheet" href="/shared/brand.css">
<link rel="stylesheet" href="/admin/admin.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<script src="/admin/admin-common.js"></script>
<script>renderAdminShell('/admin/payroll-staff.html', 'Staff Dashboard');</script>
<script src="/shared/charts.js"></script>
<script>
const staffId = new URLSearchParams(window.location.search).get('id');

function kpiCard(label, value, sub) {
  return `<div class="kpi-card"><div class="label">${label}</div><div class="value">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
}

function statusBadge(status) {
  const map = { approved: 'amber', paid: 'green' };
  return `<span class="badge ${map[status] || 'muted'}">${status}</span>`;
}

function rowLine(type, r) {
  if (type === 'owner') {
    return `<span>${r.customerName}</span><strong>M1 ${fmtMoney(r.m1)} · M2 ${fmtMoney(r.m2)}</strong>`;
  }
  if (type === 'pm') {
    return `<span>${r.customerName} <span style="color:var(--brand-muted); font-size:12px;">Net PPW ${r.netPpw ?? '—'}</span></span><strong>M1 ${fmtMoney(r.m1)} · M2 ${fmtMoney(r.m2)}</strong>`;
  }
  return `<span>${r.customerName} <span style="color:var(--brand-muted); font-size:12px;">${fmtDate(r.solarDate)} · ${r.kw} kW</span></span><strong>${fmtMoney(r.lineAmount)}</strong>`;
}

async function load() {
  const d = await api('GET', `/api/dashboard/staff/${staffId}`);
  document.querySelector('.topbar h1').textContent = `${d.staff.full_name}'s Dashboard`;

  let kpiHtml = '';
  if (d.type === 'owner') {
    kpiHtml = [
      kpiCard('YTD Distributions', fmtMoney(d.kpis.ytdTotal)),
      kpiCard('All-Time', fmtMoney(d.kpis.allTimeTotal)),
      kpiCard('Pay Runs Counted', d.kpis.payRunCount)
    ].join('');
  } else if (d.type === 'pm') {
    kpiHtml = [
      kpiCard('Weekly Salary', fmtMoney(d.kpis.weeklySalary), 'fixed, every pay cycle'),
      kpiCard('YTD Total', fmtMoney(d.kpis.ytdTotal)),
      kpiCard('All-Time Total', fmtMoney(d.kpis.allTimeTotal), `${d.kpis.payRunCount} pay runs`)
    ].join('');
  } else {
    kpiHtml = [
      kpiCard('Latest Pay Run', fmtMoney(d.kpis.currentPeriodPay)),
      kpiCard('Base / Rate', `${fmtMoney(d.kpis.base)} + $${d.kpis.ratePerKw}/kW`),
      kpiCard('YTD Total', fmtMoney(d.kpis.ytdTotal))
    ].join('');
  }

  const ledgerHtml = d.ledger.map((l) => `
    <div style="padding:10px 0; border-bottom:1px solid var(--brand-border);">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong>${fmtDate(l.payPeriodDate)}</strong>
        <div>${statusBadge(l.status)} <strong style="margin-left:8px;">${fmtMoney(l.total)}</strong></div>
      </div>
      <div style="margin-top:6px;">
        ${l.rows.map((r) => `<div style="display:flex; justify-content:space-between; font-size:13px; color:var(--brand-muted); padding:2px 0;">${rowLine(d.type, r)}</div>`).join('')}
      </div>
    </div>`).join('');

  document.getElementById('pageContent').innerHTML = `
    <p style="color:var(--brand-muted); margin-bottom:16px; font-size:13px;">Sourced from approved Commission Summary pay runs — nothing appears here until Joy approves that pay run.</p>
    <div class="kpi-grid">${kpiHtml}</div>
    <div class="detail-grid">
      <div class="card">
        <p class="section-title">Last 6 Months</p>
        <div style="height:240px;"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="card">
        <p class="section-title">Pay Run History</p>
        <div>${ledgerHtml || '<p style="color:var(--brand-muted); font-size:13px;">Nothing approved yet.</p>'}</div>
      </div>
    </div>
    <a href="/admin/payroll-staff.html" style="display:inline-block; margin-top:16px;">← Back to Payroll Staff</a>
  `;
  renderTrendChart('trendChart', d.monthlyTrend, { color: '#B6760F', label: 'Pay' });
}
load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Installers & Financiers — POWERED Commissions</title>
<link rel="stylesheet" href="/shared/brand.css">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<script src="/admin/admin-common.js"></script>
<script>renderAdminShell('/admin/installers.html', 'Installers & Financiers');</script>
<script>
document.getElementById('pageContent').innerHTML = `
  <div class="card" style="margin-bottom:16px; overflow-x:auto;">
    <p class="section-title">Installers <span style="font-weight:400; text-transform:none; font-size:12px;">— click any field to edit, changes save automatically</span></p>
    <table class="data-table">
      <thead><tr><th>Name</th><th>Rate/W</th><th>M1%</th><th>M2%</th><th>Notes</th><th>Status</th><th></th></tr></thead>
      <tbody id="installersBody"></tbody>
    </table>
  </div>
  <div class="card" style="margin-bottom:24px; max-width:560px;">
    <p class="section-title">Add Installer</p>
    <div class="field-row cols-3">
      <div><label>Name</label><input type="text" id="ni_name"></div>
      <div><label>Rate ($/W)</label><input type="number" step="0.01" id="ni_rate"></div>
      <div></div>
    </div>
    <div class="field-row">
      <div><label>M1 %</label><input type="number" step="0.01" id="ni_m1"></div>
      <div><label>M2 %</label><input type="number" step="0.01" id="ni_m2"></div>
    </div>
    <label>Notes</label><input type="text" id="ni_notes">
    <button class="btn small" id="addInstallerBtn" style="width:auto;">Add Installer</button>
  </div>

  <div class="card" style="margin-bottom:16px; overflow-x:auto;">
    <p class="section-title">Financiers <span style="font-weight:400; text-transform:none; font-size:12px;">— click any field to edit, changes save automatically</span></p>
    <table class="data-table">
      <thead><tr><th>Name</th><th>Min FICO</th><th>Notes</th><th>Status</th><th></th></tr></thead>
      <tbody id="financiersBody"></tbody>
    </table>
  </div>
  <div class="card" style="max-width:560px;">
    <p class="section-title">Add Financier</p>
    <label>Name</label><input type="text" id="nf_name">
    <label>Min FICO</label><input type="number" id="nf_fico">
    <label>Notes</label><input type="text" id="nf_notes">
    <button class="btn small" id="addFinancierBtn" style="width:auto;">Add Financier</button>
  </div>
`;

function editableCell(cls, id, type, value, step) {
  return `<input type="${type}" class="${cls}" data-id="${id}" ${step ? `step="${step}"` : ''} value="${value ?? ''}" style="margin:0; min-width:90px;">`;
}

async function loadAll() {
  const data = await api('GET', '/api/reference');

  document.getElementById('installersBody').innerHTML = data.installers.map((i) => `
    <tr data-id="${i.id}" style="${i.active ? '' : 'opacity:0.55;'}">
      <td>${editableCell('inst-name', i.id, 'text', i.name)}</td>
      <td>${editableCell('inst-rate', i.id, 'number', i.rate_per_watt, '0.01')}</td>
      <td>${editableCell('inst-m1', i.id, 'number', i.m1_pct, '0.01')}</td>
      <td>${editableCell('inst-m2', i.id, 'number', i.m2_pct, '0.01')}</td>
      <td>${editableCell('inst-notes', i.id, 'text', i.notes)}</td>
      <td><button class="btn secondary small inst-toggle" data-id="${i.id}" data-active="${i.active}" style="width:auto;">${i.active ? 'Deactivate' : 'Reactivate'}</button></td>
      <td><button class="icon-btn inst-delete" data-id="${i.id}" title="Delete">🗑️</button></td>
    </tr>
  `).join('');

  document.getElementById('financiersBody').innerHTML = data.financiers.map((f) => `
    <tr data-id="${f.id}" style="${f.active ? '' : 'opacity:0.55;'}">
      <td>${editableCell('fin-name', f.id, 'text', f.name)}</td>
      <td>${editableCell('fin-fico', f.id, 'number', f.min_fico)}</td>
      <td>${editableCell('fin-notes', f.id, 'text', f.notes)}</td>
      <td><button class="btn secondary small fin-toggle" data-id="${f.id}" data-active="${f.active}" style="width:auto;">${f.active ? 'Deactivate' : 'Reactivate'}</button></td>
      <td><button class="icon-btn fin-delete" data-id="${f.id}" title="Delete">🗑️</button></td>
    </tr>
  `).join('');

  wireEditableRows();
}

function wireEditableRows() {
  async function saveInstaller(id, field, value) {
    try { await api('PUT', `/api/reference/installers/${id}`, { [field]: value }); } catch (e) { alert(e.message); }
  }
  async function saveFinancier(id, field, value) {
    try { await api('PUT', `/api/reference/financiers/${id}`, { [field]: value }); } catch (e) { alert(e.message); }
  }

  document.querySelectorAll('.inst-name').forEach((el) => el.addEventListener('change', () => saveInstaller(el.dataset.id, 'name', el.value.trim())));
  document.querySelectorAll('.inst-rate').forEach((el) => el.addEventListener('change', () => saveInstaller(el.dataset.id, 'rate_per_watt', parseFloat(el.value) || null)));
  document.querySelectorAll('.inst-m1').forEach((el) => el.addEventListener('change', () => saveInstaller(el.dataset.id, 'm1_pct', parseFloat(el.value) || null)));
  document.querySelectorAll('.inst-m2').forEach((el) => el.addEventListener('change', () => saveInstaller(el.dataset.id, 'm2_pct', parseFloat(el.value) || null)));
  document.querySelectorAll('.inst-notes').forEach((el) => el.addEventListener('change', () => saveInstaller(el.dataset.id, 'notes', el.value.trim() || null)));
  document.querySelectorAll('.inst-toggle').forEach((btn) => btn.addEventListener('click', async () => {
    await saveInstaller(btn.dataset.id, 'active', btn.dataset.active === '1' ? 0 : 1);
    loadAll();
  }));
  document.querySelectorAll('.inst-delete').forEach((btn) => btn.addEventListener('click', async () => {
    if (!confirm('Delete this installer permanently? Only works if no deals reference it.')) return;
    try { await api('DELETE', `/api/reference/installers/${btn.dataset.id}`); loadAll(); } catch (e) { alert(e.message); }
  }));

  document.querySelectorAll('.fin-name').forEach((el) => el.addEventListener('change', () => saveFinancier(el.dataset.id, 'name', el.value.trim())));
  document.querySelectorAll('.fin-fico').forEach((el) => el.addEventListener('change', () => saveFinancier(el.dataset.id, 'min_fico', parseInt(el.value) || null)));
  document.querySelectorAll('.fin-notes').forEach((el) => el.addEventListener('change', () => saveFinancier(el.dataset.id, 'notes', el.value.trim() || null)));
  document.querySelectorAll('.fin-toggle').forEach((btn) => btn.addEventListener('click', async () => {
    await saveFinancier(btn.dataset.id, 'active', btn.dataset.active === '1' ? 0 : 1);
    loadAll();
  }));
  document.querySelectorAll('.fin-delete').forEach((btn) => btn.addEventListener('click', async () => {
    if (!confirm('Delete this financier permanently? Only works if no deals reference it.')) return;
    try { await api('DELETE', `/api/reference/financiers/${btn.dataset.id}`); loadAll(); } catch (e) { alert(e.message); }
  }));
}

document.getElementById('addInstallerBtn').addEventListener('click', async () => {
  const name = document.getElementById('ni_name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  try {
    await api('POST', '/api/reference/installers', {
      name,
      rate_per_watt: parseFloat(document.getElementById('ni_rate').value) || null,
      m1_pct: parseFloat(document.getElementById('ni_m1').value) || null,
      m2_pct: parseFloat(document.getElementById('ni_m2').value) || null,
      notes: document.getElementById('ni_notes').value.trim() || null
    });
    ['ni_name', 'ni_rate', 'ni_m1', 'ni_m2', 'ni_notes'].forEach((id) => { document.getElementById(id).value = ''; });
    loadAll();
  } catch (e) { alert(e.message); }
});

document.getElementById('addFinancierBtn').addEventListener('click', async () => {
  const name = document.getElementById('nf_name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  try {
    await api('POST', '/api/reference/financiers', {
      name,
      min_fico: parseInt(document.getElementById('nf_fico').value) || null,
      notes: document.getElementById('nf_notes').value.trim() || null
    });
    ['nf_name', 'nf_fico', 'nf_notes'].forEach((id) => { document.getElementById(id).value = ''; });
    loadAll();
  } catch (e) { alert(e.message); }
});

loadAll();
</script>
</body>
</html>

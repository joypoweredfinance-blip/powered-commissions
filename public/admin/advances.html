<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Advances — POWERED Commissions</title>
<link rel="stylesheet" href="/shared/brand.css">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<script src="/admin/admin-common.js"></script>
<script>renderAdminShell('/admin/advances.html', 'Advances');</script>
<script>
let REPS = [];

document.getElementById('pageContent').innerHTML = `
  <p style="color:var(--brand-muted); margin-bottom:16px; max-width:680px;">
    Money POWERED fronts a rep before a deal funds — standard advance is $1,000/job. Mark deducted once it's been taken out of a later payout.
  </p>
  <div class="card" style="margin-bottom:16px; max-width:600px;">
    <p class="section-title">New Advance</p>
    <div class="field-row">
      <div><label>Rep</label><select id="na_rep_id"></select></div>
      <div><label>Amount ($)</label><input type="number" step="0.01" id="na_amount" value="1000"></div>
    </div>
    <div class="field-row">
      <div><label>Date Sent</label><input type="date" id="na_date_sent"></div>
      <div><label>Notes</label><input type="text" id="na_notes"></div>
    </div>
    <button class="btn small" id="addAdvanceBtn" style="width:auto;">Add Advance</button>
  </div>
  <div class="card" style="overflow-x:auto;">
    <table class="data-table">
      <thead><tr><th>Rep</th><th>Amount</th><th>Date Sent</th><th>Status</th><th>Deducted</th><th>Notes</th><th></th></tr></thead>
      <tbody id="advancesBody"></tbody>
    </table>
  </div>
`;

async function loadReps() {
  const meta = await api('GET', '/api/meta');
  REPS = meta.reps;
  document.getElementById('na_rep_id').innerHTML = REPS.map((r) => `<option value="${r.id}">${r.display_name || r.full_name}</option>`).join('');
}

async function loadAdvances() {
  const rows = await api('GET', '/api/advances');
  document.getElementById('advancesBody').innerHTML = rows.map((a) => `
    <tr data-id="${a.id}">
      <td>${a.rep_name}</td>
      <td>${fmtMoney(a.amount)}</td>
      <td>${fmtDate(a.date_sent)}</td>
      <td>
        <select class="status-select">
          ${['pending', 'approved', 'disbursed', 'deducted'].map((s) => `<option value="${s}" ${s === a.status ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </td>
      <td>${fmtMoney(a.amount_deducted)}</td>
      <td style="color:var(--brand-muted); font-size:13px;">${a.notes || ''}</td>
      <td><button class="icon-btn delete-btn">✕</button></td>
    </tr>
  `).join('');

  document.querySelectorAll('#advancesBody tr').forEach((row) => {
    const id = row.dataset.id;
    row.querySelector('.status-select').addEventListener('change', async (e) => {
      try { await api('PUT', `/api/advances/${id}`, { status: e.target.value }); } catch (err) { alert(err.message); }
    });
    row.querySelector('.delete-btn').addEventListener('click', async () => {
      if (!confirm('Delete this advance record?')) return;
      try { await api('DELETE', `/api/advances/${id}`); loadAdvances(); } catch (err) { alert(err.message); }
    });
  });
}

document.getElementById('addAdvanceBtn').addEventListener('click', async () => {
  try {
    await api('POST', '/api/advances', {
      rep_id: Number(document.getElementById('na_rep_id').value),
      amount: parseFloat(document.getElementById('na_amount').value),
      date_sent: document.getElementById('na_date_sent').value || null,
      notes: document.getElementById('na_notes').value.trim() || null
    });
    document.getElementById('na_notes').value = '';
    loadAdvances();
  } catch (e) { alert(e.message); }
});

loadReps().then(loadAdvances);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Deals Board — POWERED Commissions</title>
<link rel="stylesheet" href="/shared/brand.css">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<script src="/admin/admin-common.js"></script>
<script>renderAdminShell('/admin/board.html', 'Deals Board');</script>
<script>
document.getElementById('pageContent').classList.add('full-bleed');

// Fixed, closed list — same set used on the Dashboard and the deal page.
const FUNDING_STATUSES = [
  'M1 Pending', 'M1 Approved - Awaiting Funding', 'M1 Rejected',
  'M2 Pending', 'M2 Approved - Awaiting Funding', 'M2 Rejected Clawback',
  'M1 Funded', 'M1+M2 Funded'
];
let SELECTED_BOARD_STATUS_IDS = [];
let SELECTED_BOARD_FUNDING_STATUSES = [];
let BOARD_DATE_RANGE = null;
let LAST_DEALS = [];

document.getElementById('pageContent').innerHTML = `
  <div class="filter-grid" style="margin-bottom:14px;">
    <div class="card filter-card">
      <div style="font-size:12px; font-weight:700; color:var(--brand-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px;">Filter by Solar Date</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <select id="boardDateTypeFilter" style="margin:0; max-width:160px;">
          <option value="all">All Time</option>
          <option value="year">Year</option>
          <option value="month">Month</option>
          <option value="week">Week</option>
          <option value="range">Custom Range</option>
        </select>
        <div id="boardDateSecondaryControls" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
        <button class="btn small" id="boardDateApplyBtn" style="width:auto;">Apply</button>
      </div>
    </div>
    <div class="card filter-card board-status-filter-wrap" style="position:relative;">
      <div style="font-size:12px; font-weight:700; color:var(--brand-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px;">Filter by CRM Status</div>
      <button class="btn secondary small" id="boardStatusFilterBtn" style="width:auto;">Filter by CRM Status ▾</button>
      <span id="boardStatusSummary" style="font-size:12px; color:var(--brand-muted); margin-left:10px;"></span>
      <div class="status-filter-panel" id="boardStatusFilterPanel" style="display:none;"></div>
    </div>
    <div class="card filter-card board-funding-filter-wrap" style="position:relative;">
      <div style="font-size:12px; font-weight:700; color:var(--brand-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px;">Filter by Funding Status</div>
      <button class="btn secondary small" id="boardFundingFilterBtn" style="width:auto;">Filter by Funding Status ▾</button>
      <span id="boardFundingSummary" style="font-size:12px; color:var(--brand-muted); margin-left:10px;"></span>
      <div class="status-filter-panel" id="boardFundingFilterPanel" style="display:none;"></div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search customer or address…">
    <select id="repFilter"><option value="">All reps</option></select>
    <select id="installerFilter"><option value="">All installers</option></select>
    <select id="phaseFilter">
      <option value="">All phases</option>
      <option value="pre_install">Pre-install</option>
      <option value="post_install">Post-install</option>
      <option value="closed">Closed</option>
    </select>
    <button class="btn secondary small" id="exportCsvBtn" style="width:auto; margin-left:auto;">Export CSV</button>
    <button class="btn small" id="newDealBtn" style="width:auto;">+ New Deal</button>
  </div>
  <div class="card" style="overflow-x:auto;">
    <table class="data-table" id="dealsTable">
      <thead>
        <tr>
          <th>Customer</th><th class="col-compact">Installer</th><th class="col-compact">Financier</th>
          <th class="col-compact">Closer</th><th class="col-compact">Setter</th><th class="col-compact">Solar Date</th>
          <th>System Size</th><th>Contract Value</th><th>EPC Cost</th>
          <th>Total Adders <span style="font-weight:400; text-transform:none;">(Roof + MPU + Battery + Misc)</span></th>
          <th>Gross</th><th>Net PPW</th><th>Rep Pool</th>
          <th>Closer Pay</th><th>Setter Pay</th><th>Staff Pay</th>
          <th>Funds Pending M1</th><th>Funds Pending M2</th><th>Total Funds Pending</th>
          <th>Funds Received M1</th><th>Funds Received M2</th><th>Total Funds Received</th>
          <th>POWERED Net</th><th>Approved</th>
        </tr>
      </thead>
      <tbody id="dealsBody"><tr><td colspan="24" style="text-align:center; color:var(--brand-muted); padding:30px;">Loading…</td></tr></tbody>
    </table>
  </div>
`;
const COL_COUNT = 24;

let META = { reps: [], installers: [] };

function approvalBadge(deal) {
  const bits = [];
  if (deal.closer_rep_id) bits.push(deal.closer_breakdown_approved ? '<span class="badge green">Closer ✓</span>' : '<span class="badge muted">Closer pending</span>');
  if (deal.setter_rep_id) bits.push(deal.setter_breakdown_approved ? '<span class="badge amber">Setter ✓</span>' : '<span class="badge muted">Setter pending</span>');
  return bits.join(' ') || '—';
}

function statusPanelHtml(options, cbClass) {
  return `
    ${options}
    <div class="actions">
      <button class="btn secondary small panel-select-all" data-cb="${cbClass}" style="width:auto;">All</button>
      <button class="btn secondary small panel-clear-all" data-cb="${cbClass}" style="width:auto;">Clear</button>
      <button class="btn small panel-apply" data-cb="${cbClass}" style="width:auto; margin-left:auto;">Apply</button>
    </div>
  `;
}

function pad(n) { return String(n).padStart(2, '0'); }
function isoDate(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }

// Picking a date type/value only stages it — nothing takes effect until "Apply" is clicked,
// same pattern as the Dashboard's date filter.
function renderBoardDateSecondaryControls(type) {
  const el = document.getElementById('boardDateSecondaryControls');
  const now = new Date();
  if (type === 'all') {
    el.innerHTML = '';
  } else if (type === 'year') {
    let opts = '';
    for (let y = now.getFullYear(); y >= now.getFullYear() - 5; y--) opts += `<option value="${y}">${y}</option>`;
    el.innerHTML = `<select id="boardYearPicker" style="margin:0;">${opts}</select>`;
  } else if (type === 'month') {
    let opts = '';
    for (let i = 0; i < 24; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      opts += `<option value="${d.getFullYear()}-${pad(d.getMonth() + 1)}">${d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</option>`;
    }
    el.innerHTML = `<select id="boardMonthPicker" style="margin:0;">${opts}</select>`;
  } else if (type === 'week') {
    el.innerHTML = `<input type="date" id="boardWeekPicker" value="${isoDate(now)}" style="margin:0;"><span style="font-size:12px; color:var(--brand-muted); align-self:center;">pick any day in the week</span>`;
  } else if (type === 'range') {
    const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
    el.innerHTML = `
      <input type="date" id="boardRangeStart" value="${isoDate(weekAgo)}" style="margin:0;">
      <span style="align-self:center; color:var(--brand-muted);">to</span>
      <input type="date" id="boardRangeEnd" value="${isoDate(now)}" style="margin:0;">
    `;
  }
}

function applyBoardDateFilter() {
  const type = document.getElementById('boardDateTypeFilter').value;
  if (type === 'all') {
    BOARD_DATE_RANGE = null;
  } else if (type === 'year') {
    const y = document.getElementById('boardYearPicker').value;
    BOARD_DATE_RANGE = { startDate: `${y}-01-01`, endDate: `${y}-12-31` };
  } else if (type === 'month') {
    const ym = document.getElementById('boardMonthPicker').value;
    const [y, m] = ym.split('-').map(Number);
    const lastDay = new Date(y, m, 0).getDate();
    BOARD_DATE_RANGE = { startDate: `${ym}-01`, endDate: `${ym}-${pad(lastDay)}` };
  } else if (type === 'week') {
    const anchor = new Date(document.getElementById('boardWeekPicker').value + 'T00:00:00');
    const dow = anchor.getDay(); // 0=Sun
    const monday = new Date(anchor); monday.setDate(anchor.getDate() - ((dow + 6) % 7));
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    BOARD_DATE_RANGE = { startDate: isoDate(monday), endDate: isoDate(sunday) };
  } else if (type === 'range') {
    BOARD_DATE_RANGE = { startDate: document.getElementById('boardRangeStart').value, endDate: document.getElementById('boardRangeEnd').value };
  }
  loadDeals();
}

async function loadMeta() {
  META = await api('GET', '/api/meta');
  const repFilter = document.getElementById('repFilter');
  META.reps.forEach((r) => repFilter.insertAdjacentHTML('beforeend', `<option value="${r.id}">${r.display_name || r.full_name}</option>`));
  const installerFilter = document.getElementById('installerFilter');
  META.installers.forEach((i) => installerFilter.insertAdjacentHTML('beforeend', `<option value="${i.id}">${i.name}</option>`));

  document.getElementById('boardDateTypeFilter').addEventListener('change', (e) => {
    renderBoardDateSecondaryControls(e.target.value);
  });
  document.getElementById('boardDateApplyBtn').addEventListener('click', applyBoardDateFilter);

  document.getElementById('boardStatusFilterPanel').innerHTML = statusPanelHtml(
    META.statuses.map((s) => `<label><input type="checkbox" class="board-status-cb" value="${s.id}"> ${s.label}</label>`).join(''),
    'board-status-cb'
  );
  document.getElementById('boardFundingFilterPanel').innerHTML = statusPanelHtml(
    FUNDING_STATUSES.map((s) => `<label><input type="checkbox" class="board-funding-cb" value="${s}"> ${s}</label>`).join(''),
    'board-funding-cb'
  );

  document.getElementById('boardStatusFilterBtn').addEventListener('click', () => {
    const panel = document.getElementById('boardStatusFilterPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('boardFundingFilterBtn').addEventListener('click', () => {
    const panel = document.getElementById('boardFundingFilterPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  });
  document.querySelectorAll('.panel-select-all').forEach((btn) => btn.addEventListener('click', () => {
    document.querySelectorAll(`.${btn.dataset.cb}`).forEach((cb) => { cb.checked = true; });
  }));
  document.querySelectorAll('.panel-clear-all').forEach((btn) => btn.addEventListener('click', () => {
    document.querySelectorAll(`.${btn.dataset.cb}`).forEach((cb) => { cb.checked = false; });
  }));
  document.querySelectorAll('.panel-apply').forEach((btn) => btn.addEventListener('click', () => {
    if (btn.dataset.cb === 'board-status-cb') {
      SELECTED_BOARD_STATUS_IDS = [...document.querySelectorAll('.board-status-cb:checked')].map((cb) => cb.value);
      document.getElementById('boardStatusSummary').textContent = SELECTED_BOARD_STATUS_IDS.length ? `${SELECTED_BOARD_STATUS_IDS.length} selected` : '';
      document.getElementById('boardStatusFilterPanel').style.display = 'none';
    } else {
      SELECTED_BOARD_FUNDING_STATUSES = [...document.querySelectorAll('.board-funding-cb:checked')].map((cb) => cb.value);
      document.getElementById('boardFundingSummary').textContent = SELECTED_BOARD_FUNDING_STATUSES.length ? `${SELECTED_BOARD_FUNDING_STATUSES.length} selected` : '';
      document.getElementById('boardFundingFilterPanel').style.display = 'none';
    }
    loadDeals();
  }));
  document.addEventListener('click', (e) => {
    const wrap = document.querySelector('.board-status-filter-wrap');
    if (wrap && !wrap.contains(e.target)) document.getElementById('boardStatusFilterPanel').style.display = 'none';
    const fwrap = document.querySelector('.board-funding-filter-wrap');
    if (fwrap && !fwrap.contains(e.target)) document.getElementById('boardFundingFilterPanel').style.display = 'none';
  });
}

async function loadDeals() {
  const params = new URLSearchParams();
  const search = document.getElementById('searchInput').value.trim();
  const repId = document.getElementById('repFilter').value;
  const installerId = document.getElementById('installerFilter').value;
  const phase = document.getElementById('phaseFilter').value;
  if (search) params.set('search', search);
  if (repId) params.set('repId', repId);
  if (installerId) params.set('installerId', installerId);
  if (phase) params.set('phase', phase);
  SELECTED_BOARD_STATUS_IDS.forEach((id) => params.append('statusIds', id));
  SELECTED_BOARD_FUNDING_STATUSES.forEach((s) => params.append('fundingStatuses', s));
  if (BOARD_DATE_RANGE) {
    params.set('startDate', BOARD_DATE_RANGE.startDate);
    params.set('endDate', BOARD_DATE_RANGE.endDate);
  }

  const deals = await api('GET', `/api/deals?${params.toString()}`);
  LAST_DEALS = deals;
  const tbody = document.getElementById('dealsBody');
  if (deals.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${COL_COUNT}" style="text-align:center; color:var(--brand-muted); padding:30px;">No deals match these filters.</td></tr>`;
    return;
  }
  let html = '';
  let lastStatus = null;
  for (const d of deals) {
    if (d.status_label !== lastStatus) {
      html += `<tr class="group-row"><td colspan="${COL_COUNT}">${d.status_label || 'No Status'}</td></tr>`;
      lastStatus = d.status_label;
    }
    const staffPay = (d.owner_etai_total || 0) + (d.owner_noy_total || 0) + (d.joey_m1_bonus || 0) + (d.joey_m2_bonus || 0);
    const totalAdders = d.total_adders || 0;
    const totalFundsReceived = (d.funds_received_m1 || 0) + (d.funds_received_m2 || 0);
    // POWERED Net = Total Funds Received less (Closer Pay + Setter Pay + Staff Pay) for this job.
    const poweredNet = totalFundsReceived - ((d.closer_pay_net || 0) + (d.setter_pay || 0) + staffPay);
    const fundsPendingM1 = d.funds_pending_m1 ?? 0;
    const fundsPendingM2 = d.funds_pending_m2 ?? 0;
    const netPpwCell = d.below_floor
      ? '<span class="badge amber">Below floor</span>'
      : (d.net_ppw !== null && d.net_ppw !== undefined
        ? `<span style="${d.net_ppw > 3.50 ? 'color:var(--status-green); font-weight:700;' : ''}">${d.net_ppw}</span>`
        : '—');
    html += `
      <tr class="deal-row" data-id="${d.id}">
        <td><strong>${d.customer_name}</strong><br><span style="color:var(--brand-muted); font-size:12px;">${d.customer_address || ''}</span></td>
        <td class="col-compact">${d.installer_name || '—'}</td>
        <td class="col-compact">${d.financier_name || '—'}</td>
        <td class="col-compact">${d.closer_display || d.closer_name || '—'}</td>
        <td class="col-compact">${d.setter_display || d.setter_name || '—'}</td>
        <td class="col-compact">${fmtDate(d.install_completed_date)}</td>
        <td>${d.system_size_kw ? d.system_size_kw + ' kW' : '—'}</td>
        <td>${fmtMoney(d.contract_value)}</td>
        <td>${fmtMoney(d.epc_cost)}</td>
        <td>${fmtMoney(totalAdders)}</td>
        <td>${fmtMoney(d.gross_amount)}</td>
        <td>${netPpwCell}</td>
        <td>${fmtMoney(d.rep_pool)}</td>
        <td>${fmtMoney(d.closer_pay_net)}</td>
        <td>${fmtMoney(d.setter_pay)}</td>
        <td>${fmtMoney(staffPay)}</td>
        <td>${fmtMoney(fundsPendingM1)}</td>
        <td>${fmtMoney(fundsPendingM2)}</td>
        <td>${fmtMoney(fundsPendingM1 + fundsPendingM2)}</td>
        <td>${fmtMoney(d.funds_received_m1)}</td>
        <td>${fmtMoney(d.funds_received_m2)}</td>
        <td>${fmtMoney(totalFundsReceived)}</td>
        <td>${fmtMoney(poweredNet)}</td>
        <td>${approvalBadge(d)}</td>
      </tr>
    `;
  }
  tbody.innerHTML = html;
  tbody.querySelectorAll('.deal-row').forEach((row) => {
    row.addEventListener('click', () => { window.location.href = `/admin/deal.html?id=${row.dataset.id}`; });
  });
}

document.getElementById('searchInput').addEventListener('input', () => { clearTimeout(window._t); window._t = setTimeout(loadDeals, 250); });
document.getElementById('repFilter').addEventListener('change', loadDeals);
document.getElementById('installerFilter').addEventListener('change', loadDeals);
document.getElementById('phaseFilter').addEventListener('change', loadDeals);
document.getElementById('newDealBtn').addEventListener('click', () => { window.location.href = '/admin/deal.html'; });

// Exports exactly the rows currently on screen (same filters applied) — raw numbers, not
// formatted dollar strings, so the figures can be summed directly in Excel.
document.getElementById('exportCsvBtn').addEventListener('click', () => {
  const headers = [
    'Customer', 'Address', 'Installer', 'Financier', 'Closer', 'Setter', 'Solar Date', 'CRM Status',
    'System Size (kW)', 'Contract Value', 'EPC Cost', 'Total Adders', 'Gross', 'Net PPW', 'Rep Pool',
    'Closer Pay', 'Setter Pay', 'Staff Pay', 'Funds Pending M1', 'Funds Pending M2', 'Total Funds Pending',
    'Funds Received M1', 'Funds Received M2', 'Total Funds Received', 'POWERED Net',
    'Closer Approved', 'Setter Approved'
  ];
  const rows = LAST_DEALS.map((d) => {
    const staffPay = round2((d.owner_etai_total || 0) + (d.owner_noy_total || 0) + (d.joey_m1_bonus || 0) + (d.joey_m2_bonus || 0));
    const totalAdders = d.total_adders || 0;
    const totalFundsReceived = round2((d.funds_received_m1 || 0) + (d.funds_received_m2 || 0));
    const poweredNet = round2(totalFundsReceived - ((d.closer_pay_net || 0) + (d.setter_pay || 0) + staffPay));
    const fundsPendingM1 = d.funds_pending_m1 ?? 0;
    const fundsPendingM2 = d.funds_pending_m2 ?? 0;
    return [
      d.customer_name, d.customer_address || '', d.installer_name || '', d.financier_name || '',
      d.closer_display || d.closer_name || '', d.setter_display || d.setter_name || '',
      (d.install_completed_date || '').slice(0, 10), d.status_label || '',
      d.system_size_kw ?? '', d.contract_value ?? 0, d.epc_cost ?? 0, totalAdders,
      d.gross_amount ?? 0, d.net_ppw ?? '', d.rep_pool ?? 0,
      d.closer_pay_net ?? 0, d.setter_pay ?? 0, staffPay,
      fundsPendingM1, fundsPendingM2, round2(fundsPendingM1 + fundsPendingM2),
      d.funds_received_m1 ?? 0, d.funds_received_m2 ?? 0, totalFundsReceived, poweredNet,
      d.closer_rep_id ? (d.closer_breakdown_approved ? 'Yes' : 'No') : '',
      d.setter_rep_id ? (d.setter_breakdown_approved ? 'Yes' : 'No') : ''
    ];
  });
  downloadCsv(`deals-board-${new Date().toISOString().slice(0, 10)}.csv`, headers, rows);
});
function round2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }

// loadDeals doesn't read from META, so these run as two parallel requests instead of one
// waiting on the other — each Turso round-trip has real latency, so this halves the wait.
Promise.all([loadMeta(), loadDeals()]);
</script>
</body>
</html>
